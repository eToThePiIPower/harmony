name: ExUnit

on:
  pull_request:
    branches: ["develop", "main"]
  push:
    branches: ["main", "develop", "feature.**"]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:11
        ports: ['5432:5432']
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - name: Setup Elixir & OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '25.0.1'
          elixir-version: '1.13.4'
      - name: Setup Chromium & Chromedriver
        run: |
          apt-get update
          curl -LO http://archive.ubuntu.com/ubuntu/pool/universe/c/chromium-browser/chromium-browser_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb
          curl -LO http://archive.ubuntu.com/ubuntu/pool/universe/c/chromium-browser/chromium-chromedriver_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb
          curl -LO http://archive.ubuntu.com/ubuntu/pool/universe/c/chromium-browser/chromium-codecs-ffmpeg_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb
          apt-get install -y ./chromium-browser_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb ./chromium-chromedriver_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb ./chromium-codecs-ffmpeg_101.0.4951.64-0ubuntu0.18.04.1_amd64.deb
      - name: Restore dependencies
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: mix test
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOSTNAME: localhost
          POSTGRES_PORT: 5432
